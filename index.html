<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="A lightweight and easy-to-use student-controlled dashboard.">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta property="og:title" content="SwiftClass">
    <meta property="og:description" content="A lightweight and easy-to-use student-controlled dashboard.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://swiftclass.app">
    <meta property="og:image" content="https://swiftclass.app/ogImage.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SwiftClass">
    <meta name="twitter:description" content="A lightweight and easy-to-use student-controlled dashboard.">
    <meta name="twitter:image" content="https://swiftclass.app/ogImage.png">

    <meta name="theme-color" content="#b1b1e3">

    <link rel="stylesheet" href="Resources/main.css">
    <link rel="stylesheet" href="Resources/settings/settings.css">
    <link rel="stylesheet" href="Resources/RadialMenu.css">
    <link rel="stylesheet" href="Resources/info/infoSlides.css">
    <link rel="stylesheet" href="Resources/classes/classes.css">
    <link rel="stylesheet" href="Resources/links/links.css">


    <script src="Resources/main.js" defer></script>
    <script src="Resources/RadialMenu.js"></script>
    <script src="Resources/info/infoSlides.js"></script>
    <script src="Resources/settings/settings.js"></script>
    <script src="Resources/classes/classes.js"></script>
    <script src="Resources/links/links.js"></script>
    <script src="https://kit.fontawesome.com/e0f7d34d66.js" crossorigin="anonymous"></script>

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "SwiftClass",
            "applicationCategory": "EducationalApplication",
            "operatingSystem": "Web"
        }
    </script>

    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <title>SwiftClass - Home</title>
</head>
<body>
<div id="container" style="position: absolute;"></div>
<div class="content" id="content">
    <div class="headerContainer">
        <section>
        <h1 class="topHeader header" id="topHeader">...</h1>
        <h3 class="timeTicker" id="timeTicker">...</h3>
        </section>
    </div>
    <div class="main background" id="main">
        <div class="newsTicker baseContent" id="baseContent">
            <h1 class="newsHeader" id="newsHeader">

            </h1>
            <div class="newsText" id="newsTickerText">
            </div>
        </div>
    </div>
    <div class="footer flexCenter" id="footer">
        <div class="footerAligner">
            <div class="footerButton">
                <span class="footerButtonText">Home</span>
            </div>
            <div class="footerButton">
                <span class="footerButtonText">Settings</span>
            </div>
            <div class="footerButton">
                <span class="footerButtonText">Classes</span>
            </div>
            <div class="footerButton">
                <span class="footerButtonText">Links</span>
            </div>
            <div class="footerButton">
                <span class="footerButtonText">Agendas</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
